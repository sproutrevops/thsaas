<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TH SAAS — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 44px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      text-align: center;
    }
    .logo {
      width: 52px; height: 52px;
      background: #2563eb;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; color: #fff;
      margin: 0 auto 20px;
    }
    h1 { font-size: 20px; font-weight: 800; color: #111827; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #6b7280; margin-bottom: 32px; line-height: 1.5; }
    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 13px 20px;
      background: #fff; border: 1.5px solid #d1d5db;
      border-radius: 10px; cursor: pointer;
      font-size: 14px; font-weight: 600; color: #111827;
      text-decoration: none;
      transition: background .15s, border-color .15s, box-shadow .15s;
    }
    .google-btn:hover {
      background: #f9fafb;
      border-color: #9ca3af;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .google-btn svg { flex-shrink: 0; }
    .divider { margin: 28px 0; display: flex; align-items: center; gap: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
    .divider span { font-size: 11px; color: #9ca3af; font-weight: 500; }
    .footer-note { font-size: 11.5px; color: #9ca3af; line-height: 1.6; }
    .footer-note strong { color: #6b7280; }
    .error-banner {
      background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
      border-radius: 8px; padding: 10px 14px; font-size: 12.5px;
      font-weight: 500; margin-bottom: 20px; display: none;
    }
    .error-banner.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">T</div>
    <h1>TH SAAS</h1>
    <p class="subtitle">Data Integration Platform<br>Sign in with your organization account to continue.</p>

    <div class="error-banner" id="error-banner"></div>

    <a href="/auth/google" class="google-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </a>

    <div class="divider"><span>access restricted</span></div>
    <p class="footer-note">Only <strong>authorized accounts</strong> can access this platform. Contact your administrator if you need access.</p>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const err = params.get('error');
    const msgs = {
      not_allowed:   'Your Google account is not authorized to access this app.',
      access_denied: 'Sign-in was cancelled. Please try again.',
      auth_failed:   'Authentication failed. Please try again or contact your administrator.',
    };
    if (err && msgs[err]) {
      const banner = document.getElementById('error-banner');
      banner.textContent = msgs[err];
      banner.classList.add('show');
    }
  </script>
</body>
</html>
